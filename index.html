// ---------- HELPERS ----------
function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function generateRandomCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
    let result = '';
    for (let i = 0; i < 6; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
    return result;
}

function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
}

function showToast() {
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
}

function showMessage(containerId, text, type) {
    const c = document.getElementById(containerId);
    if (!c) return;
    c.textContent = text;
    c.className = type === 'success' ? 'success-msg' : 'error-msg';
    c.classList.remove('hidden');
    setTimeout(() => c.classList.add('hidden'), 3000);
}

// ---------- CLOUD SYNC ----------
async function loadFromCloud() {
    if (!JSONBIN_BIN_ID || JSONBIN_BIN_ID === 'YOUR_BIN_ID') {
        console.warn('JSONBin not configured. Using local storage only.');
        return false;
    }
    try {
        const response = await fetch(API_BASE, {
            headers: { 'X-Master-Key': JSONBIN_API_KEY }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const cloudData = data.record;
        if (cloudData.employees) employees = cloudData.employees;
        if (cloudData.submissions) submissions = cloudData.submissions;
        if (cloudData.events) events = cloudData.events;
        if (cloudData.eventSettings) eventSettings = cloudData.eventSettings;
        sortEvents();
        document.getElementById('sync-status').innerHTML = '✓ Synced with cloud';
        return true;
    } catch (err) {
        console.error('Cloud load failed:', err);
        document.getElementById('sync-status').innerHTML = '⚠ Cloud sync error';
        return false;
    }
}

        const response = await fetch(API_BASE, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': JSONBIN_API_KEY
            },
            body: JSON.stringify(data)
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        document.getElementById('sync-status').innerHTML = '✓ Synced with cloud';
        return true;
    } catch (err) {
        console.error('Cloud save failed:', err);
        document.getElementById('sync-status').innerHTML = '⚠ Cloud sync error';
        return false;
    }
}

// ---------- LOCAL DATA (defaults) ----------
function loadLocalDefault() {
    let baseId = 1742740000000;
    employees = [];
    for (let i = 0; i < defaultEmployeesRaw.length; i++) {
        const emp = defaultEmployeesRaw[i];
        employees.push({
            id: baseId + i + 1,
            empCode: emp.code,
            name: emp.name,
            section: emp.section
        });
    }
    submissions = {};
    events = [...defaultEvents];
    sortEvents();
    eventSettings = {};
}

async function initData() {
    const cloudLoaded = await loadFromCloud();
    if (!cloudLoaded) {
        loadLocalDefault();
        await saveToCloud();
    }
    sortEvents();
}

function sortEvents() {
    events.sort((a, b) => new Date(a.date) - new Date(b.date));
}

// ---------- CAPACITY HELPERS ----------
function getCapacityForEvent(eventId, section) {
    const s = eventSettings[eventId];
    if (s && s.capacities && s.capacities[section] !== undefined) return s.capacities[section];
    return DEFAULT_CAPACITIES[section];
}

function getPreAssignedCount(eventId, section) {
    const s = eventSettings[eventId];
    if (!s || !s.preAssignments) return 0;
    return s.preAssignments.filter(pid => employees.find(e => e.id == pid)?.section === section).length;
}

function getSelfAssignedCount(eventId, section) {
    let count = 0;
    for (let empId in submissions) {
        const emp = employees.find(e => e.id == empId);
        if (emp && emp.section === section && submissions[empId].includes(eventId)) count++;
    }
    return count;
}

function remainingSlots(eventId, section) {
    const cap = getCapacityForEvent(eventId, section);
    const pre = getPreAssignedCount(eventId, section);
    const self = getSelfAssignedCount(eventId, section);
    return cap - pre - self;
}

function isEmployeePreAssigned(empId, eventId) {
    const s = eventSettings[eventId];
    return s && s.preAssignments && s.preAssignments.includes(empId);
}

// ---------- RENDER DATES (staff) ----------
let currentEmployeeId = null;
async function renderDates() {
    const container = document.getElementById('dates-container');
    if (!container || !currentEmployeeId) return;
    const emp = employees.find(e => e.id === currentEmployeeId);
    if (!emp) return;
    const section = emp.section;
    container.innerHTML = '';
    for (const event of events) {
        const remaining = remainingSlots(event.id, section);
        const isCurrentlyAvailable = (submissions[currentEmployeeId] || []).includes(event.id);
        const isPre = isEmployeePreAssigned(currentEmployeeId, event.id);
        const isChecked = isPre || isCurrentlyAvailable;
        const isDisabled = isPre || (remaining <= 0 && !isCurrentlyAvailable);
        const slotsInfo = isPre ? ' (You are pre-assigned)' : ` slots left: ${remaining}`;
        const div = document.createElement('div');
        div.className = 'date-item';
        div.innerHTML = `
            <div class="event-info">
                <strong>${formatDate(event.date)}</strong><br>
                ${event.venue}
            </div>
            <div class="slots-info">
                ${section.charAt(0).toUpperCase() + section.slice(1)}${slotsInfo}
            </div>
            <label>
                <input type="checkbox" data-id="${event.id}" ${isChecked ? 'checked' : ''} ${isDisabled ? 'disabled' : ''}>
                Available
            </label>
        `;
        container.appendChild(div);
    }
}

// ---------- SUBMIT AVAILABILITY (cloud) ----------
async function submitAvailability() {
    if (!currentEmployeeId) {
        showMessage('staff-message', 'Please load your employee details first.', 'error');
        return;
    }
    const checkboxes = document.querySelectorAll('#dates-container input[type="checkbox"]');
    const selected = [];
    checkboxes.forEach(cb => { if (cb.checked) selected.push(cb.getAttribute('data-id')); });

    const emp = employees.find(e => e.id === currentEmployeeId);
    const section = emp.section;

    for (let eventId of selected) {
        if (isEmployeePreAssigned(currentEmployeeId, eventId)) continue;
        const remaining = remainingSlots(eventId, section);
        const already = (submissions[currentEmployeeId] || []).includes(eventId);
        if (!already && remaining <= 0) {
            showMessage('staff-message', `Cannot add ${section} for ${events.find(e=>e.id===eventId)?.venue}: capacity full.`, 'error');
            return;
        }
    }

    submissions[currentEmployeeId] = selected;
    await saveToCloud();
    showToast();
    showMessage('staff-message', `Availability saved for ${emp.name}. Thank you!`, 'success');
    renderDates();
    if (managerAuthenticated) {
        renderAvailabilityMatrix(document.querySelector('.filter-btn.active')?.dataset.section || 'all');
    }
}

// ---------- ADMIN FUNCTIONS ----------
async function addEvent(date, venue) {
    if (!date || !venue) { alert('Enter both'); return false; }
    if (events.some(e => e.date === date && e.venue === venue)) { alert('Event exists'); return false; }
    const newId = Date.now().toString();
    events.push({ id: newId, date, venue });
    sortEvents();
    await saveToCloud();
    refreshAllViews();
    return true;
}

async function deleteEvent(eventId) {
    if (confirm('Delete this event?')) {
        events = events.filter(e => e.id !== eventId);
        for (let empId in submissions) submissions[empId] = submissions[empId].filter(eid => eid !== eventId);
        delete eventSettings[eventId];
        await saveToCloud();
        refreshAllViews();
    }
}

function refreshAllViews() {
    if (managerAuthenticated) {
        renderAdminEmployees();
        renderAdminEventsList();
        renderAvailabilityMatrix(document.querySelector('.filter-btn.active')?.dataset.section || 'all');
    }
    if (currentEmployeeId) renderDates();
}

function renderAdminEventsList() {
    const container = document.getElementById('event-list');
    container.innerHTML = '';
    events.forEach(event => {
        const div = document.createElement('div');
        div.style.display = 'flex';
        div.style.justifyContent = 'space-between';
        div.style.alignItems = 'center';
        div.style.padding = '8px';
        div.style.borderBottom = '1px solid #eee';
        div.innerHTML = `
            <span>${formatDate(event.date)} – ${event.venue}</span>
            <div>
                <button class="edit-event-settings" data-id="${event.id}" style="background:#2196f3;">Edit</button>
                <button class="delete-event" data-id="${event.id}" style="background:#ff4444;">Delete</button>
            </div>
        `;
        container.appendChild(div);
    });
    document.querySelectorAll('.delete-event').forEach(btn => btn.addEventListener('click', () => deleteEvent(btn.getAttribute('data-id'))));
    document.querySelectorAll('.edit-event-settings').forEach(btn => btn.addEventListener('click', () => openEventSettingsModal(btn.getAttribute('data-id'))));
}

// Event settings modal
let currentEventIdForSettings = null;
function openEventSettingsModal(eventId) {
    currentEventIdForSettings = eventId;
    const event = events.find(e => e.id === eventId);
    document.getElementById('eventSettingsTitle').innerText = `Settings for ${formatDate(event.date)} – ${event.venue}`;
    const container = document.getElementById('eventSettingsContent');
    const settings = eventSettings[eventId] || { capacities: {}, preAssignments: [] };

    let capsHtml = '<div class="capacity-row">';
    const sections = ['kitchen','floor','bar','cleaner','setup','manager'];
    for (const sec of sections) {
        const val = settings.capacities[sec] !== undefined ? settings.capacities[sec] : DEFAULT_CAPACITIES[sec];
        capsHtml += `<div class="capacity-field"><label>${sec}</label><input type="number" id="cap-${sec}" value="${val}" min="0"></div>`;
    }
    capsHtml += '</div>';

    const employeesBySection = {};
    employees.forEach(e => {
        if (!employeesBySection[e.section]) employeesBySection[e.section] = [];
        employeesBySection[e.section].push(e);
    });

    let preHtml = '<h4>Pre-assign Staff</h4>';
    for (const sec of sections) {
        const emps = employeesBySection[sec] || [];
        if (emps.length === 0) continue;
        preHtml += `<div><strong>${sec}</strong></div><div class="preassign-list">`;
        for (const emp of emps) {
            const checked = settings.preAssignments?.includes(emp.id);
            preHtml += `<div class="preassign-item"><label>${emp.name} (${emp.empCode})</label><input type="checkbox" class="preassign-checkbox" data-id="${emp.id}" ${checked ? 'checked' : ''}></div>`;
        }
        preHtml += '</div>';
    }

    container.innerHTML = capsHtml + preHtml;
    document.getElementById('eventSettingsModal').style.display = 'flex';
}

async function saveEventSettings() {
    if (!currentEventIdForSettings) return;
    const capacities = {};
    const sections = ['kitchen','floor','bar','cleaner','setup','manager'];
    for (const sec of sections) {
        const input = document.getElementById(`cap-${sec}`);
        if (input) capacities[sec] = parseInt(input.value,10);
    }
    const preAssignments = [];
    document.querySelectorAll('.preassign-checkbox:checked').forEach(cb => preAssignments.push(parseInt(cb.getAttribute('data-id'))));
    eventSettings[currentEventIdForSettings] = { capacities, preAssignments };
    await saveToCloud();
    showToast();
    closeEventSettingsModal();
    refreshAllViews();
}

function closeEventSettingsModal() {
    document.getElementById('eventSettingsModal').style.display = 'none';
    currentEventIdForSettings = null;
}

// Employee management
let editingEmployeeId = null;
function openEditModal(empId) {
    const emp = employees.find(e => e.id === empId);
    if (!emp) return;
    editingEmployeeId = empId;
    document.getElementById('edit-emp-name').value = emp.name;
    document.getElementById('edit-emp-section').value = emp.section;
    document.getElementById('edit-emp-code').value = emp.empCode;
    document.getElementById('edit-error').classList.add('hidden');
    document.getElementById('editModal').style.display = 'flex';
}
function closeEditModal() { document.getElementById('editModal').style.display = 'none'; editingEmployeeId = null; }
async function saveEdit() {
    const newName = document.getElementById('edit-emp-name').value.trim();
    const newSection = document.getElementById('edit-emp-section').value;
    const newCode = document.getElementById('edit-emp-code').value.trim();
    if (!newName || !newCode) { showEditError('Name and code required'); return; }
    if (employees.some(e => e.id !== editingEmployeeId && e.empCode === newCode)) { showEditError('Code already exists'); return; }
    const idx = employees.findIndex(e => e.id === editingEmployeeId);
    if (idx !== -1) {
        employees[idx].name = newName;
        employees[idx].section = newSection;
        employees[idx].empCode = newCode;
        await saveToCloud();
        closeEditModal();
        refreshAllViews();
    }
}
function showEditError(msg) {
    const errDiv = document.getElementById('edit-error');
    errDiv.textContent = msg;
    errDiv.classList.remove('hidden');
}

function renderAdminEmployees() {
    const container = document.getElementById('employee-list');
    container.innerHTML = '';
    employees.forEach(emp => {
        const card = document.createElement('div');
        card.className = 'employee-card';
        card.innerHTML = `
            <div class="name">${escapeHtml(emp.name)} <span class="code">${emp.empCode}</span></div>
            <div class="sections">Section: ${emp.section}</div>
            <div>
                <button class="edit-btn" data-id="${emp.id}">Edit</button>
                <button class="generate-code-btn" data-id="${emp.id}">Regenerate Code</button>
                <button class="remove-emp" data-id="${emp.id}">Remove</button>
            </div>
        `;
        container.appendChild(card);
    });
    document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => openEditModal(parseInt(btn.getAttribute('data-id')))));
    document.querySelectorAll('.generate-code-btn').forEach(btn => btn.addEventListener('click', async () => {
        const id = parseInt(btn.getAttribute('data-id'));
        const emp = employees.find(e => e.id === id);
        if (emp) { emp.empCode = generateRandomCode(); await saveToCloud(); renderAdminEmployees(); }
    }));
    document.querySelectorAll('.remove-emp').forEach(btn => btn.addEventListener('click', async () => {
        const id = parseInt(btn.getAttribute('data-id'));
        if (confirm('Remove employee?')) {
            employees = employees.filter(e => e.id !== id);
            delete submissions[id];
            for (let evId in eventSettings) {
                if (eventSettings[evId].preAssignments) eventSettings[evId].preAssignments = eventSettings[evId].preAssignments.filter(pid => pid !== id);
            }
            await saveToCloud();
            renderAdminEmployees();
            refreshAllViews();
        }
    }));
}

// Availability Matrix
async function renderAvailabilityMatrix(sectionFilter = 'all') {
    const container = document.getElementById('availability-matrix');
    const statusSpan = document.getElementById('matrix-sync-status');
    if (statusSpan) statusSpan.innerText = 'Loading latest data...';
    await loadFromCloud();  // force fresh data
    if (statusSpan) statusSpan.innerText = '';

    let filtered = sectionFilter === 'all' ? employees : employees.filter(e => e.section === sectionFilter);
    if (filtered.length === 0) { container.innerHTML = '<p>No employees in this section.</p>'; return; }

    let html = '<table style="min-width:600px;"><thead><th>Event</th>';
    filtered.forEach(emp => html += `<th>${escapeHtml(emp.name)}<br><small>${emp.empCode}</small></th>`);
    html += '</thead><tbody>';
    for (const event of events) {
        html += ` tr<td><strong>${formatDate(event.date)}<br>${event.venue}</strong>`;
        for (const emp of filtered) {
            const available = (submissions[emp.id] || []).includes(event.id) || isEmployeePreAssigned(emp.id, event.id);
            html += `<td style="text-align:center;">${available ? '<span class="available-yes">✓</span>' : '<span class="available-no">✗</span>'}`;
        }
        html += '  ';
    }
    html += '</tbody>  </div>';

    // Summary
    const sections = ['kitchen','floor','bar','cleaner','setup','manager'];
    html += '<div style="margin-top:30px;"><h3>Summary by Section</h3>';
    for (const sec of sections) {
        const secEmps = employees.filter(e => e.section === sec);
        if (secEmps.length === 0) continue;
        html += `<h4>${sec}</h4>   <thead><th>Event</th><th>Assigned / Capacity</th><th>Remaining</th>   </thead><tbody>`;
        for (const event of events) {
            const pre = getPreAssignedCount(event.id, sec);
            const self = getSelfAssignedCount(event.id, sec);
            const total = pre + self;
            const cap = getCapacityForEvent(event.id, sec);
            const rem = cap - total;
            html += `   <td><strong>${formatDate(event.date)}<br>${event.venue}</strong>   <td>${total} / ${cap}   <td style="color:#D4AF37;">${rem < 0 ? 0 : rem} left  `;
        }
        html += '</tbody>  ';
    }
    html += '</div>';
    container.innerHTML = html;
}

async function addEmployee() {
    const name = document.getElementById('new-employee-name').value.trim();
    const section = document.getElementById('new-employee-section').value;
    let code = document.getElementById('new-employee-code').value.trim();
    if (!name) { alert('Enter name'); return; }
    if (!code) code = generateRandomCode();
    if (employees.some(e => e.empCode === code)) { alert('Code exists'); return; }
    const newId = Date.now();
    employees.push({ id: newId, empCode: code, name, section });
    await saveToCloud();
    document.getElementById('new-employee-name').value = '';
    document.getElementById('new-employee-code').value = '';
    renderAdminEmployees();
    refreshAllViews();
    showToast();
}

function exportCSV() {
    let csv = 'Employee Code,Name,Section,Event Date,Venue,Available\n';
    for (const emp of employees) {
        const av = submissions[emp.id] || [];
        for (const ev of events) {
            const yes = av.includes(ev.id) || isEmployeePreAssigned(emp.id, ev.id);
            csv += `"${emp.empCode}","${emp.name}","${emp.section}","${formatDate(ev.date)}","${ev.venue}",${yes ? 'Yes' : 'No'}\n`;
        }
    }
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'staff-availability.csv';
    a.click();
    URL.revokeObjectURL(a.href);
}

function exportEmployeeCodes() {
    let csv = 'Name,Code,Section\n';
    employees.forEach(emp => csv += `"${emp.name}","${emp.empCode}","${emp.section}"\n`);
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'employee-codes.csv';
    a.click();
}

function showCodeList() {
    const container = document.getElementById('code-list-container');
    const ta = document.getElementById('code-list-textarea');
    let text = '';
    employees.forEach(emp => text += `${emp.name} – ${emp.empCode} – ${emp.section}\n`);
    ta.value = text;
    container.classList.remove('hidden');
}

function copyCodeList() {
    const ta = document.getElementById('code-list-textarea');
    ta.select();
    document.execCommand('copy');
    alert('Copied!');
}

async function clearAllData() {
    if (confirm('Reset all data? This will delete all employees, events, submissions.')) {
        loadLocalDefault();
        await saveToCloud();
        location.reload();
    }
}

async function syncNow() {
    await loadFromCloud();
    refreshAllViews();
    showMessage('save-status', 'Synced from cloud', 'success');
}

function switchTab(tabId) {
    if ((tabId === 'admin' || tabId === 'availability') && !managerAuthenticated) {
        const pwd = prompt('Manager password:');
        if (pwd === MANAGER_PASSWORD) {
            managerAuthenticated = true;
            sessionStorage.setItem('managerAuthenticated', 'true');
        } else { alert('Wrong password'); return; }
    }
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId + '-pane').classList.add('active');
    document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
    if (tabId === 'admin') {
        renderAdminEmployees();
        renderAdminEventsList();
    } else if (tabId === 'availability') {
        renderAvailabilityMatrix('all');
    }
}

function initFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderAvailabilityMatrix(btn.dataset.section);
        });
    });
}

function loadEmployeeByCode() {
    const code = document.getElementById('employee-code').value.trim().toUpperCase();
    if (!code) { alert('Enter code'); return; }
    const emp = employees.find(e => e.empCode === code);
    if (!emp) { alert('Code not found'); return; }
    currentEmployeeId = emp.id;
    document.getElementById('display-name').innerText = emp.name;
    document.getElementById('display-section').innerText = emp.section;
    document.getElementById('staff-details').classList.remove('hidden');
    renderDates();
}

async function init() {
    await initData();
    initFilters();

    // Modals
    document.querySelectorAll('.close-modal').forEach(c => c.addEventListener('click', () => {
        document.getElementById('editModal').style.display = 'none';
        document.getElementById('eventSettingsModal').style.display = 'none';
    }));

    document.getElementById('save-edit').addEventListener('click', saveEdit);
    document.getElementById('edit-generate-random').addEventListener('click', () => {
        document.getElementById('edit-emp-code').value = generateRandomCode();
    });
    document.getElementById('generate-random-code').addEventListener('click', () => {
        document.getElementById('new-employee-code').value = generateRandomCode();
    });
    document.getElementById('saveEventSettings').addEventListener('click', saveEventSettings);

    document.getElementById('load-employee').addEventListener('click', loadEmployeeByCode);
    document.getElementById('submit-availability').addEventListener('click', submitAvailability);
    document.getElementById('add-employee').addEventListener('click', addEmployee);
    document.getElementById('add-event').addEventListener('click', async () => {
        const date = document.getElementById('new-event-date').value;
        const venue = document.getElementById('new-event-venue').value.trim();
        if (await addEvent(date, venue)) {
            document.getElementById('new-event-date').value = '';
            document.getElementById('new-event-venue').value = '';
        }
    });
    document.getElementById('export-csv').addEventListener('click', exportCSV);
    document.getElementById('export-codes').addEventListener('click', exportEmployeeCodes);
    document.getElementById('show-code-list').addEventListener('click', showCodeList);
    document.getElementById('copy-code-list').addEventListener('click', copyCodeList);
    document.getElementById('clear-all-data').addEventListener('click', clearAllData);
    document.getElementById('sync-now').addEventListener('click', syncNow);

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
    });

    // Preload matrix if manager already logged in
    if (managerAuthenticated) renderAvailabilityMatrix('all');
}

init();
</script>
