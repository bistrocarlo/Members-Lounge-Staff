<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Members Lounge Staff Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: "Segoe UI", "Roboto", sans-serif;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: #000000;
            border-bottom: 2px solid #D4AF37;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            background: #D4AF37;
            color: #000000;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .logo h1 {
            color: #D4AF37;
            font-size: 1.5rem;
        }

        .nav {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav a {
            color: #ffffff;
            text-decoration: none;
            padding: 8px 12px;
            transition: color 0.3s ease;
        }

        .nav a:hover,
        .nav a.active {
            color: #D4AF37;
        }

        .btn {
            background: #D4AF37;
            color: #000000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #C6A22E;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
        }

        .btn-outline:hover {
            background: #D4AF37;
            color: #000000;
        }

        .card {
            background: #1E1E1E;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333333;
        }

        .card h2,
        .card h3 {
            color: #D4AF37;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #B0B0B0;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            background: #2D2D2D;
            border: 1px solid #444444;
            border-radius: 6px;
            color: #ffffff;
        }

        .role-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .role-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333333;
        }

        th {
            color: #D4AF37;
        }

        .event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #333333;
            gap: 20px;
        }

        .event-date {
            font-weight: 600;
        }

        .event-venue {
            color: #B0B0B0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #444444;
            transition: 0.3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .switch input:checked + .slider {
            background-color: #D4AF37;
        }

        .switch input:checked + .slider:before {
            transform: translateX(26px);
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #1e4620;
            color: #a5d6a5;
        }

        .alert-error {
            background: #4a1c1c;
            color: #ffb3b3;
        }

        .hidden {
            display: none !important;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .role-badge {
            background: #D4AF37;
            color: #000000;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin: 2px;
            text-transform: capitalize;
        }

        .muted {
            color: #B0B0B0;
        }

        ul.clean-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }

            .nav {
                justify-content: center;
            }

            .event-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">ML</div>
                <h1>Members Lounge Staff</h1>
            </div>

            <div class="nav hidden" id="nav-links">
                <a href="#" data-page="dashboard">Dashboard</a>
                <a href="#" data-page="events">Events</a>
                <a href="#" data-page="assignments">My Assignments</a>
                <a href="#" data-page="admin" id="admin-link" class="hidden">Admin</a>
                <a href="#" id="logout-link">Logout</a>
            </div>
        </div>

        <!-- Auth Section -->
        <div id="auth-section">
            <div class="card" id="login-card">
                <h2>Staff Login</h2>
                <div id="login-error" class="alert alert-error hidden"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required />
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required />
                    </div>

                    <button type="submit" class="btn">Sign In</button>
                    <p style="margin-top: 15px;">
                        New staff? <a href="#" id="show-register">Create an account</a>
                    </p>
                </form>
            </div>

            <div class="card hidden" id="register-card">
                <h2>Staff Registration</h2>
                <div id="register-error" class="alert alert-error hidden"></div>

                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" required />
                    </div>

                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" required />
                    </div>

                    <div class="form-group">
                        <label for="reg-phone">Phone (optional)</label>
                        <input type="tel" id="reg-phone" />
                    </div>

                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required />
                    </div>

                    <div class="form-group">
                        <label>Roles you can perform</label>
                        <div class="role-group">
                            <label><input type="checkbox" value="kitchen" /> Kitchen</label>
                            <label><input type="checkbox" value="floor" /> Floor</label>
                            <label><input type="checkbox" value="bar" /> Bar</label>
                            <label><input type="checkbox" value="cleaner" /> Cleaner</label>
                            <label><input type="checkbox" value="setup" /> Setup Crew</label>
                        </div>
                    </div>

                    <button type="submit" class="btn">Register</button>
                    <p style="margin-top: 15px;">
                        Already have an account? <a href="#" id="show-login">Sign in</a>
                    </p>
                </form>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-section" class="hidden">
            <div class="card">
                <h2 id="dashboard-welcome"></h2>
                <div class="flex-between" style="margin-top: 20px;">
                    <div>
                        <h3>Quick Actions</h3>
                        <button class="btn" id="goto-events">View Events & Set Availability</button>
                        <button class="btn btn-outline" id="goto-assignments" style="margin-left: 10px;">My Assignments</button>
                    </div>
                    <div>
                        <h3>Your Roles</h3>
                        <div id="user-roles-badges"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Events -->
        <div id="events-section" class="hidden">
            <div class="card">
                <h2>Upcoming Events</h2>
                <div id="events-list"></div>
            </div>
        </div>

        <!-- Assignments -->
        <div id="assignments-section" class="hidden">
            <div class="card">
                <h2>My Assignments</h2>
                <div id="assignments-list"></div>
            </div>
        </div>

        <!-- Admin -->
        <div id="admin-section" class="hidden">
            <div class="card">
                <h2>Admin Dashboard</h2>

                <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
                    <button class="btn" id="admin-staff-btn">Staff Management</button>
                    <button class="btn" id="admin-events-btn">Event Management</button>
                    <button class="btn" id="admin-assignments-btn">Assignments</button>
                </div>

                <div id="admin-content"></div>
            </div>
        </div>
    </div>

    <script>
        // ---------- STORAGE HELPERS ----------
        function initData() {
            if (!localStorage.getItem("events")) {
                const events = [
                    { id: "1", date: "2026-03-28", venue_name: "Sala Reggio Ballroom" },

                    { id: "6", date: "2026-05-23", venue_name: "Sala Reggio Ballroom" },
                    { id: "7", date: "2026-05-24", venue_name: "Sala Reggio Ballroom" },
                    { id: "8", date: "2026-05-29", venue_name: "Sala Reggio Ballroom" },
                    { id: "9", date: "2026-05-30", venue_name: "Sala Reggio Ballroom" },
                    { id: "10", date: "2026-05-31", venue_name: "Sala Reggio Ballroom" },
                    { id: "11", date: "2026-06-07", venue_name: "Sala Reggio Ballroom" },
                    { id: "12", date: "2026-06-07", venue_name: "Fior Events" },
                    { id: "13", date: "2026-06-12", venue_name: "Sala Reggio Ballroom" },
                    { id: "14", date: "2026-06-13", venue_name: "Sala Reggio Ballroom" },
                    { id: "15", date: "2026-06-20", venue_name: "Sala Reggio Ballroom" },
                    { id: "16", date: "2026-06-21", venue_name: "Sala Reggio Ballroom" },
                    { id: "17", date: "2026-07-19", venue_name: "Sala Reggio Ballroom" },
                    { id: "18", date: "2026-07-25", venue_name: "Sala Reggio Ballroom" },
                    { id: "19", date: "2026-07-25", venue_name: "Fior Events" },
                    { id: "20", date: "2026-07-26", venue_name: "Sala Reggio Ballroom" },
                    { id: "21", date: "2026-08-01", venue_name: "Sala Reggio Ballroom" },
                    { id: "22", date: "2026-08-02", venue_name: "Sala Reggio Ballroom" },
                    { id: "23", date: "2026-08-08", venue_name: "Sala Reggio Ballroom" },
                    { id: "24", date: "2026-08-15", venue_name: "Sala Reggio Ballroom" },
                    { id: "25", date: "2026-08-16", venue_name: "Fior Events" },
                    { id: "26", date: "2026-08-22", venue_name: "Sala Reggio Ballroom" },
                    { id: "27", date: "2026-08-23", venue_name: "Sala Reggio Ballroom" },
                    { id: "28", date: "2026-08-30", venue_name: "Sala Reggio Ballroom" },
                    { id: "29", date: "2026-09-13", venue_name: "Sala Reggio Ballroom" },
                    { id: "30", date: "2026-09-13", venue_name: "Fior Events" },
                    { id: "31", date: "2026-09-18", venue_name: "Sala Reggio Ballroom" },
                    { id: "32", date: "2026-09-20", venue_name: "Fior Events" },
                    { id: "33", date: "2026-10-03", venue_name: "Fior Events" },
                    { id: "34", date: "2026-10-17", venue_name: "Sala Reggio Ballroom" },
                    { id: "35", date: "2026-11-13", venue_name: "Sala Reggio Ballroom" },
                    { id: "36", date: "2026-11-21", venue_name: "Sala Reggio Ballroom" },
                    { id: "37", date: "2026-12-11", venue_name: "Fior Events" },
                    { id: "38", date: "2026-12-12", venue_name: "Fior Events" },
                    { id: "39", date: "2026-12-14", venue_name: "Sala Reggio Ballroom" },
                    { id: "40", date: "2026-12-15", venue_name: "Sala Reggio Ballroom" },
                    { id: "41", date: "2026-12-17", venue_name: "Sala Reggio Ballroom" },
                    { id: "42", date: "2027-02-27", venue_name: "Fior Events" },
                    { id: "43", date: "2027-02-28", venue_name: "Fior Events" },
                    { id: "44", date: "2027-03-27", venue_name: "Fior Events" }
                ];
                localStorage.setItem("events", JSON.stringify(events));
            }

            if (!localStorage.getItem("staff")) {
                const admin = {
                    id: "admin1",
                    email: "admin@memberslounge.com",
                    password: "admin123",
                    full_name: "Admin User",
                    phone: "",
                    roles: [],
                    is_admin: true
                };
                localStorage.setItem("staff", JSON.stringify([admin]));
            }

            if (!localStorage.getItem("availability")) {
                localStorage.setItem("availability", JSON.stringify([]));
            }

            if (!localStorage.getItem("assignments")) {
                localStorage.setItem("assignments", JSON.stringify([]));
            }
        }

        function getEvents() {
            return JSON.parse(localStorage.getItem("events") || "[]");
        }

        function getStaff() {
            return JSON.parse(localStorage.getItem("staff") || "[]");
        }

        function getAvailability() {
            return JSON.parse(localStorage.getItem("availability") || "[]");
        }

        function getAssignments() {
            return JSON.parse(localStorage.getItem("assignments") || "[]");
        }

        function saveStaff(staff) {
            localStorage.setItem("staff", JSON.stringify(staff));
        }

        function saveAvailability(availability) {
            localStorage.setItem("availability", JSON.stringify(availability));
        }

        function saveAssignments(assignments) {
            localStorage.setItem("assignments", JSON.stringify(assignments));
        }

        let currentUser = null;

        // ---------- UI ELEMENTS ----------
        const authSection = document.getElementById("auth-section");
        const dashboardSection = document.getElementById("dashboard-section");
        const eventsSection = document.getElementById("events-section");
        const assignmentsSection = document.getElementById("assignments-section");
        const adminSection = document.getElementById("admin-section");

        const loginCard = document.getElementById("login-card");
        const registerCard = document.getElementById("register-card");

        const navLinksContainer = document.getElementById("nav-links");
        const adminLink = document.getElementById("admin-link");
        const logoutLink = document.getElementById("logout-link");

        // ---------- NAV ----------
        function hideAllPages() {
            dashboardSection.classList.add("hidden");
            eventsSection.classList.add("hidden");
            assignmentsSection.classList.add("hidden");
            adminSection.classList.add("hidden");
        }

        function showPage(page) {
            hideAllPages();

            if (page === "dashboard") {
                dashboardSection.classList.remove("hidden");
            } else if (page === "events") {
                eventsSection.classList.remove("hidden");
            } else if (page === "assignments") {
                assignmentsSection.classList.remove("hidden");
            } else if (page === "admin" && currentUser?.is_admin) {
                adminSection.classList.remove("hidden");
            }

            updateNav(page);
        }

        function updateNav(activePage) {
            document.querySelectorAll(".nav a[data-page]").forEach(link => {
                link.classList.remove("active");
                const page = link.getAttribute("data-page");
                if (page === activePage) {
                    link.classList.add("active");
                }
            });
        }

        function updateHeaderForAuth() {
            if (currentUser) {
                navLinksContainer.classList.remove("hidden");
                if (currentUser.is_admin) {
                    adminLink.classList.remove("hidden");
                } else {
                    adminLink.classList.add("hidden");
                }
            } else {
                navLinksContainer.classList.add("hidden");
                adminLink.classList.add("hidden");
            }
        }

        // ---------- RENDERS ----------
        function renderDashboard() {
            document.getElementById("dashboard-welcome").innerText = `Welcome, ${currentUser.full_name}`;

            const rolesBadges = document.getElementById("user-roles-badges");
            if (currentUser.roles && currentUser.roles.length > 0) {
                rolesBadges.innerHTML = currentUser.roles
                    .map(role => `<span class="role-badge">${role}</span>`)
                    .join("");
            } else {
                rolesBadges.innerHTML = `<span class="muted">No roles selected</span>`;
            }
        }

        function renderEvents() {
            const events = getEvents();
            const availability = getAvailability();
            const container = document.getElementById("events-list");

            container.innerHTML = "";

            events.forEach(event => {
                const userAvailability = availability.find(
                    item => item.user_id === currentUser.id && item.event_id === event.id
                );

                const isChecked = userAvailability ? userAvailability.is_available : false;

                const eventDiv = document.createElement("div");
                eventDiv.className = "event-item";
                eventDiv.innerHTML = `
                    <div>
                        <div class="event-date">
                            ${new Date(event.date + "T00:00:00").toLocaleDateString("en-GB", {
                                day: "numeric",
                                month: "short",
                                year: "numeric"
                            })}
                        </div>
                        <div class="event-venue">${event.venue_name}</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" data-event-id="${event.id}" ${isChecked ? "checked" : ""} />
                        <span class="slider"></span>
                    </label>
                `;
                container.appendChild(eventDiv);
            });

            document.querySelectorAll('#events-list input[type="checkbox"]').forEach(input => {
                input.addEventListener("change", event => {
                    const eventId = event.target.getAttribute("data-event-id");
                    const isAvailable = event.target.checked;

                    const availability = getAvailability();
                    const existing = availability.find(
                        item => item.user_id === currentUser.id && item.event_id === eventId
                    );

                    if (existing) {
                        existing.is_available = isAvailable;
                    } else {
                        availability.push({
                            user_id: currentUser.id,
                            event_id: eventId,
                            is_available: isAvailable
                        });
                    }

                    saveAvailability(availability);
                });
            });
        }

        function renderMyAssignments() {
            const assignments = getAssignments().filter(item => item.user_id === currentUser.id);
            const events = getEvents();
            const container = document.getElementById("assignments-list");

            if (assignments.length === 0) {
                container.innerHTML = "<p>You have no assignments yet.</p>";
                return;
            }

            container.innerHTML = `
                <ul class="clean-list">
                    ${assignments.map(assignment => {
                        const event = events.find(e => e.id === assignment.event_id);
                        const formattedDate = event
                            ? new Date(event.date + "T00:00:00").toLocaleDateString("en-GB", {
                                day: "numeric",
                                month: "short",
                                year: "numeric"
                            })
                            : "";

                        return `
                            <li style="margin-bottom: 15px;">
                                <strong>${formattedDate}</strong><br>
                                ${event ? event.venue_name : ""}<br>
                                <span class="role-badge">${assignment.role}</span>
                            </li>
                        `;
                    }).join("")}
                </ul>
            `;
        }

        function renderAdminStaff() {
            const staff = getStaff();

            document.getElementById("admin-content").innerHTML = `
                <h3>Staff List</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Roles</th>
                            <th>Admin</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${staff.map(person => `
                            <tr>
                                <td>${person.full_name}</td>
                                <td>${person.email}</td>
                                <td>${person.phone || "—"}</td>
                                <td>${person.roles.join(", ") || "—"}</td>
                                <td>${person.is_admin ? "Yes" : "No"}</td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            `;
        }

        function renderAdminEvents() {
            const events = getEvents();

            document.getElementById("admin-content").innerHTML = `
                <h3>Event List</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Venue</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${events.map(event => `
                            <tr>
                                <td>${new Date(event.date + "T00:00:00").toLocaleDateString("en-GB")}</td>
                                <td>${event.venue_name}</td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            `;
        }

        function renderAdminAssignments() {
            const assignments = getAssignments();
            const staff = getStaff();
            const events = getEvents();

            document.getElementById("admin-content").innerHTML = `
                <h3>Current Assignments</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Event</th>
                            <th>Staff</th>
                            <th>Role</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${assignments.map(item => {
                            const event = events.find(e => e.id === item.event_id);
                            const user = staff.find(s => s.id === item.user_id);

                            const eventLabel = event
                                ? `${new Date(event.date + "T00:00:00").toLocaleDateString("en-GB")} - ${event.venue_name}`
                                : "";

                            return `
                                <tr>
                                    <td>${eventLabel}</td>
                                    <td>${user ? user.full_name : ""}</td>
                                    <td><span class="role-badge">${item.role}</span></td>
                                </tr>
                            `;
                        }).join("")}
                    </tbody>
                </table>
                <p style="margin-top: 15px;"><em>In a future version, staff can be assigned directly here.</em></p>
            `;
        }

        // ---------- AUTH ----------
        function login(email, password) {
            const staff = getStaff();
            const user = staff.find(person => person.email === email && person.password === password);

            if (!user) return false;

            currentUser = user;
            localStorage.setItem("currentUser", JSON.stringify(user));

            authSection.classList.add("hidden");
            updateHeaderForAuth();
            renderDashboard();
            showPage("dashboard");

            return true;
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem("currentUser");

            authSection.classList.remove("hidden");
            hideAllPages();
            updateHeaderForAuth();

            loginCard.classList.remove("hidden");
            registerCard.classList.add("hidden");

            document.getElementById("login-form").reset();
            document.getElementById("register-form").reset();

            document.getElementById("login-error").classList.add("hidden");
            document.getElementById("register-error").classList.add("hidden");
        }

        function register(name, email, phone, password, roles) {
            const staff = getStaff();

            if (staff.find(person => person.email.toLowerCase() === email.toLowerCase())) {
                return false;
            }

            const newUser = {
                id: Date.now().toString(),
                email,
                password,
                full_name: name,
                phone,
                roles,
                is_admin: false
            };

            staff.push(newUser);
            saveStaff(staff);
            return true;
        }

        // ---------- EVENTS ----------
        document.getElementById("login-form").addEventListener("submit", event => {
            event.preventDefault();

            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value;

            const success = login(email, password);

            if (!success) {
                const errorDiv = document.getElementById("login-error");
                errorDiv.innerText = "Invalid email or password";
                errorDiv.classList.remove("hidden");
            } else {
                document.getElementById("login-error").classList.add("hidden");
            }
        });

        document.getElementById("register-form").addEventListener("submit", event => {
            event.preventDefault();

            const name = document.getElementById("reg-name").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const phone = document.getElementById("reg-phone").value.trim();
            const password = document.getElementById("reg-password").value;

            const roles = Array.from(
                document.querySelectorAll('#register-form .role-group input:checked')
            ).map(checkbox => checkbox.value);

            const success = register(name, email, phone, password, roles);

            if (!success) {
                const errorDiv = document.getElementById("register-error");
                errorDiv.innerText = "Email already exists";
                errorDiv.classList.remove("hidden");
                return;
            }

            alert("Registration successful. Please sign in.");
            document.getElementById("register-error").classList.add("hidden");
            registerCard.classList.add("hidden");
            loginCard.classList.remove("hidden");
            document.getElementById("register-form").reset();
        });

        document.getElementById("show-register").addEventListener("click", event => {
            event.preventDefault();
            loginCard.classList.add("hidden");
            registerCard.classList.remove("hidden");
            document.getElementById("login-error").classList.add("hidden");
        });

        document.getElementById("show-login").addEventListener("click", event => {
            event.preventDefault();
            registerCard.classList.add("hidden");
            loginCard.classList.remove("hidden");
            document.getElementById("register-error").classList.add("hidden");
        });

        logoutLink.addEventListener("click", event => {
            event.preventDefault();
            logout();
        });

        document.querySelectorAll(".nav a[data-page]").forEach(link => {
            link.addEventListener("click", event => {
                event.preventDefault();

                const page = link.getAttribute("data-page");

                if (page === "dashboard") {
                    renderDashboard();
                    showPage("dashboard");
                }

                if (page === "events") {
                    renderEvents();
                    showPage("events");
                }

                if (page === "assignments") {
                    renderMyAssignments();
                    showPage("assignments");
                }

                if (page === "admin" && currentUser?.is_admin) {
                    renderAdminStaff();
                    showPage("admin");
                }
            });
        });

        document.getElementById("goto-events").addEventListener("click", () => {
            renderEvents();
            showPage("events");
        });

        document.getElementById("goto-assignments").addEventListener("click", () => {
            renderMyAssignments();
            showPage("assignments");
        });

        document.getElementById("admin-staff-btn").addEventListener("click", renderAdminStaff);
        document.getElementById("admin-events-btn").addEventListener("click", renderAdminEvents);
        document.getElementById("admin-assignments-btn").addEventListener("click", renderAdminAssignments);

        // ---------- INIT ----------
        initData();

        const savedUser = localStorage.getItem("currentUser");
        if (savedUser) {
            const parsedUser = JSON.parse(savedUser);
            const staff = getStaff();
            const validUser = staff.find(person => person.id === parsedUser.id);

            if (validUser) {
                currentUser = validUser;
                authSection.classList.add("hidden");
                updateHeaderForAuth();
                renderDashboard();
                showPage("dashboard");
            } else {
                logout();
            }
        } else {
            logout();
        }
    </script>
</body>
</html>
