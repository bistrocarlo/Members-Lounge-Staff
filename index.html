<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member's Lounge Staff Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Header */
        .header {
            background: #000000;
            border-bottom: 2px solid #D4AF37;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-icon {
            background: #D4AF37;
            color: #000000;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }
        .logo h1 {
            color: #D4AF37;
            font-size: 1.5rem;
        }
        .nav {
            display: flex;
            gap: 20px;
        }
        .nav a {
            color: #ffffff;
            text-decoration: none;
            padding: 8px 12px;
            transition: color 0.3s;
        }
        .nav a:hover, .nav a.active {
            color: #D4AF37;
        }
        .btn {
            background: #D4AF37;
            color: #000000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #C6A22E;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
        }
        .btn-outline:hover {
            background: #D4AF37;
            color: #000000;
        }
        .card {
            background: #1E1E1E;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .card h2, .card h3 {
            color: #D4AF37;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #B0B0B0;
        }
        input, select {
            width: 100%;
            padding: 10px;
            background: #2D2D2D;
            border: 1px solid #444;
            border-radius: 6px;
            color: #ffffff;
        }
        .role-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .role-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffffff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            color: #D4AF37;
        }
        .event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        .event-date {
            font-weight: 600;
        }
        .event-venue {
            color: #B0B0B0;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: 0.3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #D4AF37;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .alert-success {
            background: #1e4620;
            color: #a5d6a5;
        }
        .alert-error {
            background: #4a1c1c;
            color: #ffb3b3;
        }
        .hidden {
            display: none;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .role-badge {
            background: #D4AF37;
            color: #000000;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin: 2px;
        }
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }
            .nav {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">ML</div>
                <h1>Member's Lounge Staff</h1>
            </div>
            <div class="nav" id="nav-links">
                <a href="#" data-page="dashboard">Dashboard</a>
                <a href="#" data-page="events">Events</a>
                <a href="#" data-page="my-assignments">My Assignments</a>
                <a href="#" data-page="admin" id="admin-link" class="hidden">Admin</a>
                <a href="#" id="logout-link">Logout</a>
            </div>
        </div>

        <!-- Auth Section -->
        <div id="auth-section">
            <div class="card" id="login-card">
                <h2>Staff Login</h2>
                <div id="login-error" class="alert alert-error hidden"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn">Sign In</button>
                    <p style="margin-top: 15px;">New staff? <a href="#" id="show-register">Create an account</a></p>
                </form>
            </div>

            <div class="card hidden" id="register-card">
                <h2>Staff Registration</h2>
                <div id="register-error" class="alert alert-error hidden"></div>
                <form id="register-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="reg-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone (optional)</label>
                        <input type="tel" id="reg-phone">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" required>
                    </div>
                    <div class="form-group">
                        <label>Roles you can perform</label>
                        <div class="role-group">
                            <label><input type="checkbox" value="kitchen"> Kitchen</label>
                            <label><input type="checkbox" value="floor"> Floor</label>
                            <label><input type="checkbox" value="bar"> Bar</label>
                            <label><input type="checkbox" value="cleaner"> Cleaner</label>
                            <label><input type="checkbox" value="setup"> Setup Crew</label>
                        </div>
                    </div>
                    <button type="submit" class="btn">Register</button>
                    <p style="margin-top: 15px;">Already have an account? <a href="#" id="show-login">Sign in</a></p>
                </form>
            </div>
        </div>

        <!-- Dashboard (protected) -->
        <div id="dashboard-section" class="hidden">
            <div class="card">
                <h2 id="dashboard-welcome"></h2>
                <div class="flex-between" style="margin-top: 20px;">
                    <div>
                        <h3>Quick Actions</h3>
                        <button class="btn" id="goto-events">View Events & Set Availability</button>
                        <button class="btn btn-outline" id="goto-assignments" style="margin-left: 10px;">My Assignments</button>
                    </div>
                    <div>
                        <h3>Your Roles</h3>
                        <div id="user-roles-badges"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Events Section -->
        <div id="events-section" class="hidden">
            <div class="card">
                <h2>Upcoming Events</h2>
                <div id="events-list"></div>
            </div>
        </div>

        <!-- My Assignments Section -->
        <div id="assignments-section" class="hidden">
            <div class="card">
                <h2>My Assignments</h2>
                <div id="assignments-list"></div>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="admin-section" class="hidden">
            <div class="card">
                <h2>Admin Dashboard</h2>
                <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <button class="btn" id="admin-staff-btn">Staff Management</button>
                    <button class="btn" id="admin-events-btn">Event Management</button>
                    <button class="btn" id="admin-assignments-btn">Assignments</button>
                </div>
                <div id="admin-content"></div>
            </div>
        </div>
    </div>

    <script>
        // ---------- DATA MODELS ----------
        // Staff: { id, email, password, full_name, phone, roles, is_admin }
        // Events: { id, date, venue_name, notes }
        // Availability: { user_id, event_id, is_available }
        // Assignments: { event_id, user_id, role }

        // Initialize localStorage if empty
        function initData() {
            if (!localStorage.getItem('events')) {
                const events = [
                    { id: '1', date: '2026-03-28', venue_name: 'Sala Reggio Ballroom' },
                    { id: '2', date: '2026-04-18', venue_name: 'Fior Events' },
                    { id: '3', date: '2026-05-09', venue_name: 'Fior Events' },
                    { id: '4', date: '2026-05-17', venue_name: 'Sala Reggio Ballroom' },
                    { id: '5', date: '2026-05-22', venue_name: 'Sala Reggio Ballroom' },
                    { id: '6', date: '2026-05-23', venue_name: 'Sala Reggio Ballroom' },
                    { id: '7', date: '2026-05-24', venue_name: 'Sala Reggio Ballroom' },
                    { id: '8', date: '2026-05-29', venue_name: 'Sala Reggio Ballroom' },
                    { id: '9', date: '2026-05-30', venue_name: 'Sala Reggio Ballroom' },
                    { id: '10', date: '2026-05-31', venue_name: 'Sala Reggio Ballroom' },
                    { id: '11', date: '2026-06-07', venue_name: 'Sala Reggio Ballroom' },
                    { id: '12', date: '2026-06-07', venue_name: 'Fior Events' },
                    { id: '13', date: '2026-06-12', venue_name: 'Sala Reggio Ballroom' },
                    { id: '14', date: '2026-06-13', venue_name: 'Sala Reggio Ballroom' },
                    { id: '15', date: '2026-06-20', venue_name: 'Sala Reggio Ballroom' },
                    { id: '16', date: '2026-06-21', venue_name: 'Sala Reggio Ballroom' },
                    { id: '17', date: '2026-07-19', venue_name: 'Sala Reggio Ballroom' },
                    { id: '18', date: '2026-07-25', venue_name: 'Sala Reggio Ballroom' },
                    { id: '19', date: '2026-07-25', venue_name: 'Fior Events' },
                    { id: '20', date: '2026-07-26', venue_name: 'Sala Reggio Ballroom' },
                    { id: '21', date: '2026-08-01', venue_name: 'Sala Reggio Ballroom' },
                    { id: '22', date: '2026-08-02', venue_name: 'Sala Reggio Ballroom' },
                    { id: '23', date: '2026-08-08', venue_name: 'Sala Reggio Ballroom' },
                    { id: '24', date: '2026-08-15', venue_name: 'Sala Reggio Ballroom' },
                    { id: '25', date: '2026-08-16', venue_name: 'Fior Events' },
                    { id: '26', date: '2026-08-22', venue_name: 'Sala Reggio Ballroom' },
                    { id: '27', date: '2026-08-23', venue_name: 'Sala Reggio Ballroom' },
                    { id: '28', date: '2026-08-30', venue_name: 'Sala Reggio Ballroom' },
                    { id: '29', date: '2026-09-13', venue_name: 'Sala Reggio Ballroom' },
                    { id: '30', date: '2026-09-13', venue_name: 'Fior Events' },
                    { id: '31', date: '2026-09-18', venue_name: 'Sala Reggio Ballroom' },
                    { id: '32', date: '2026-09-20', venue_name: 'Fior Events' },
                    { id: '33', date: '2026-10-03', venue_name: 'Fior Events' },
                    { id: '34', date: '2026-10-17', venue_name: 'Sala Reggio Ballroom' },
                    { id: '35', date: '2026-11-13', venue_name: 'Sala Reggio Ballroom' },
                    { id: '36', date: '2026-11-21', venue_name: 'Sala Reggio Ballroom' },
                    { id: '37', date: '2026-12-11', venue_name: 'Fior Events' },
                    { id: '38', date: '2026-12-12', venue_name: 'Fior Events' },
                    { id: '39', date: '2026-12-14', venue_name: 'Sala Reggio Ballroom' },
                    { id: '40', date: '2026-12-15', venue_name: 'Sala Reggio Ballroom' },
                    { id: '41', date: '2026-12-17', venue_name: 'Sala Reggio Ballroom' },
                    { id: '42', date: '2027-02-27', venue_name: 'Fior Events' },
                    { id: '43', date: '2027-02-28', venue_name: 'Fior Events' },
                    { id: '44', date: '2027-03-27', venue_name: 'Fior Events' }
                ];
                localStorage.setItem('events', JSON.stringify(events));
            }
            if (!localStorage.getItem('staff')) {
                // Create admin user: admin@memberslounge.com / admin123
                const admin = {
                    id: 'admin1',
                    email: 'admin@memberslounge.com',
                    password: 'admin123',
                    full_name: 'Admin User',
                    phone: '',
                    roles: [],
                    is_admin: true
                };
                localStorage.setItem('staff', JSON.stringify([admin]));
            }
            if (!localStorage.getItem('availability')) {
                localStorage.setItem('availability', JSON.stringify([]));
            }
            if (!localStorage.getItem('assignments')) {
                localStorage.setItem('assignments', JSON.stringify([]));
            }
        }

        // Helper functions
        function getEvents() { return JSON.parse(localStorage.getItem('events')); }
        function getStaff() { return JSON.parse(localStorage.getItem('staff')); }
        function getAvailability() { return JSON.parse(localStorage.getItem('availability')); }
        function getAssignments() { return JSON.parse(localStorage.getItem('assignments')); }
        function saveStaff(staff) { localStorage.setItem('staff', JSON.stringify(staff)); }
        function saveAvailability(avail) { localStorage.setItem('availability', JSON.stringify(avail)); }
        function saveAssignments(assign) { localStorage.setItem('assignments', JSON.stringify(assign)); }

        let currentUser = null;

        // UI Elements
        const authSection = document.getElementById('auth-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const eventsSection = document.getElementById('events-section');
        const assignmentsSection = document.getElementById('assignments-section');
        const adminSection = document.getElementById('admin-section');
        const loginCard = document.getElementById('login-card');
        const registerCard = document.getElementById('register-card');
        const adminLink = document.getElementById('admin-link');
        const logoutLink = document.getElementById('logout-link');

        // Navigation
        function showPage(page) {
            dashboardSection.classList.add('hidden');
            eventsSection.classList.add('hidden');
            assignmentsSection.classList.add('hidden');
            adminSection.classList.add('hidden');
            if (page === 'dashboard') dashboardSection.classList.remove('hidden');
            else if (page === 'events') eventsSection.classList.remove('hidden');
            else if (page === 'assignments') assignmentsSection.classList.remove('hidden');
            else if (page === 'admin') adminSection.classList.remove('hidden');
        }

        function updateNav() {
            const navLinks = document.querySelectorAll('.nav a[data-page]');
            navLinks.forEach(link => {
                const page = link.getAttribute('data-page');
                if (page === 'admin' && !currentUser?.is_admin) return;
                link.classList.remove('active');
                if (page === 'dashboard' && !dashboardSection.classList.contains('hidden')) link.classList.add('active');
                if (page === 'events' && !eventsSection.classList.contains('hidden')) link.classList.add('active');
                if (page === 'my-assignments' && !assignmentsSection.classList.contains('hidden')) link.classList.add('active');
                if (page === 'admin' && !adminSection.classList.contains('hidden')) link.classList.add('active');
            });
        }

        // Render Dashboard
        function renderDashboard() {
            document.getElementById('dashboard-welcome').innerText = `Welcome, ${currentUser.full_name}`;
            const rolesBadges = document.getElementById('user-roles-badges');
            rolesBadges.innerHTML = currentUser.roles.map(r => `<span class="role-badge">${r}</span>`).join('') || 'No roles selected';
        }

        // Render Events with availability toggles
        function renderEvents() {
            const events = getEvents();
            const availability = getAvailability();
            const container = document.getElementById('events-list');
            container.innerHTML = '';
            events.forEach(event => {
                const avail = availability.find(a => a.user_id === currentUser.id && a.event_id === event.id);
                const isChecked = avail ? avail.is_available : false;
                const eventDiv = document.createElement('div');
                eventDiv.className = 'event-item';
                eventDiv.innerHTML = `
                    <div>
                        <div class="event-date">${new Date(event.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
                        <div class="event-venue">${event.venue_name}</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" data-event-id="${event.id}" ${isChecked ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                `;
                container.appendChild(eventDiv);
            });
            // Add event listeners
            document.querySelectorAll('#events-list .switch input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const eventId = e.target.getAttribute('data-event-id');
                    const isChecked = e.target.checked;
                    let availability = getAvailability();
                    const existing = availability.find(a => a.user_id === currentUser.id && a.event_id === eventId);
                    if (existing) {
                        existing.is_available = isChecked;
                    } else {
                        availability.push({ user_id: currentUser.id, event_id: eventId, is_available: isChecked });
                    }
                    saveAvailability(availability);
                });
            });
        }

        // Render My Assignments
        function renderMyAssignments() {
            const assignments = getAssignments().filter(a => a.user_id === currentUser.id);
            const events = getEvents();
            const container = document.getElementById('assignments-list');
            if (assignments.length === 0) {
                container.innerHTML = '<p>You have no assignments yet.</p>';
                return;
            }
            container.innerHTML = '<ul style="list-style: none;">' + assignments.map(ass => {
                const event = events.find(e => e.id === ass.event_id);
                return `<li style="margin-bottom: 15px;">
                            <strong>${event ? new Date(event.date).toLocaleDateString() : ''}</strong><br>
                            ${event ? event.venue_name : ''}<br>
                            <span class="role-badge">${ass.role}</span>
                        </li>`;
            }).join('') + '</ul>';
        }

        // Admin views
        function renderAdminStaff() {
            const staff = getStaff();
            const html = `
                <h3>Staff List</h3>
                <table>
                    <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Roles</th><th>Admin</th></tr></thead>
                    <tbody>
                        ${staff.map(s => `
                            <tr>
                                <td>${s.full_name}</td>
                                <td>${s.email}</td>
                                <td>${s.phone || '—'}</td>
                                <td>${s.roles.join(', ') || '—'}</td>
                                <td>${s.is_admin ? 'Yes' : 'No'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('admin-content').innerHTML = html;
        }

        function renderAdminEvents() {
            const events = getEvents();
            const html = `
                <h3>Event List</h3>
                <table>
                    <thead><tr><th>Date</th><th>Venue</th></tr></thead>
                    <tbody>
                        ${events.map(e => `
                            <tr>
                                <td>${new Date(e.date).toLocaleDateString()}</td>
                                <td>${e.venue_name}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('admin-content').innerHTML = html;
        }

        function renderAdminAssignments() {
            const assignments = getAssignments();
            const staff = getStaff();
            const events = getEvents();
            const html = `
                <h3>Current Assignments</h3>
                <table>
                    <thead><tr><th>Event</th><th>Staff</th><th>Role</th></tr></thead>
                    <tbody>
                        ${assignments.map(a => {
                            const event = events.find(e => e.id === a.event_id);
                            const user = staff.find(s => s.id === a.user_id);
                            return `
                                <tr>
                                    <td>${event ? `${new Date(event.date).toLocaleDateString()} - ${event.venue_name}` : ''}</td>
                                    <td>${user ? user.full_name : ''}</td>
                                    <td><span class="role-badge">${a.role}</span></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
                <p style="margin-top: 15px;"><em>In a full version, you'd be able to assign staff here.</em></p>
            `;
            document.getElementById('admin-content').innerHTML = html;
        }

        // Login/Logout
        function login(email, password) {
            const staff = getStaff();
            const user = staff.find(s => s.email === email && s.password === password);
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(user));
                authSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                if (user.is_admin) adminLink.classList.remove('hidden');
                else adminLink.classList.add('hidden');
                renderDashboard();
                showPage('dashboard');
                updateNav();
                return true;
            }
            return false;
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            authSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
            eventsSection.classList.add('hidden');
            assignmentsSection.classList.add('hidden');
            adminSection.classList.add('hidden');
            loginCard.classList.remove('hidden');
            registerCard.classList.add('hidden');
            document.getElementById('login-error').classList.add('hidden');
            document.getElementById('register-error').classList.add('hidden');
            updateNav();
        }

        function register(name, email, phone, password, roles) {
            const staff = getStaff();
            if (staff.find(s => s.email === email)) return false;
            const newUser = {
                id: Date.now().toString(),
                email,
                password,
                full_name: name,
                phone,
                roles,
                is_admin: false
            };
            staff.push(newUser);
            saveStaff(staff);
            return true;
        }

        // Event listeners
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pwd = document.getElementById('login-password').value;
            if (login(email, pwd)) {
                // success
            } else {
                const errorDiv = document.getElementById('login-error');
                errorDiv.innerText = 'Invalid email or password';
                errorDiv.classList.remove('hidden');
            }
        });

        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const phone = document.getElementById('reg-phone').value;
            const pwd = document.getElementById('reg-password').value;
            const roles = Array.from(document.querySelectorAll('#register-form .role-group input:checked')).map(cb => cb.value);
            if (register(name, email, phone, pwd, roles)) {
                alert('Registration successful! Please log in.');
                document.getElementById('show-login').click();
            } else {
                const errorDiv = document.getElementById('register-error');
                errorDiv.innerText = 'Email already exists';
                errorDiv.classList.remove('hidden');
            }
        });

        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            loginCard.classList.add('hidden');
            registerCard.classList.remove('hidden');
        });

        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            registerCard.classList.add('hidden');
            loginCard.classList.remove('hidden');
        });

        logoutLink.addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        // Navigation links
        document.querySelectorAll('.nav a[data-page]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const page = link.getAttribute('data-page');
                if (page === 'dashboard') showPage('dashboard');
                if (page === 'events') {
                    renderEvents();
                    showPage('events');
                }
                if (page === 'my-assignments') {
                    renderMyAssignments();
                    showPage('assignments');
                }
                if (page === 'admin') showPage('admin');
                updateNav();
            });
        });

        document.getElementById('goto-events').addEventListener('click', () => {
            renderEvents();
            showPage('events');
            updateNav();
        });
        document.getElementById('goto-assignments').addEventListener('click', () => {
            renderMyAssignments();
            showPage('assignments');
            updateNav();
        });

        // Admin buttons
        document.getElementById('admin-staff-btn').addEventListener('click', renderAdminStaff);
        document.getElementById('admin-events-btn').addEventListener('click', renderAdminEvents);
        document.getElementById('admin-assignments-btn').addEventListener('click', renderAdminAssignments);

        // Initialization
        initData();
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            const user = JSON.parse(savedUser);
            const staff = getStaff();
            const validUser = staff.find(s => s.id === user.id);
            if (validUser) {
                currentUser = validUser;
                authSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                if (currentUser.is_admin) adminLink.classList.remove('hidden');
                renderDashboard();
                showPage('dashboard');
                updateNav();
            } else {
                logout();
            }
        } else {
            logout();
        }
    </script>
</body>
</html>
